    * { font-family: 'Nunito', sans-serif; box-sizing: border-box; }

    }

    @keyframes float {
      0%,100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-14px) rotate(1deg); }
    }
    @keyframes blob {
      0%,100% { border-radius: 60% 40% 30% 70%/60% 30% 70% 40%; }
      25% { border-radius: 30% 60% 70% 40%/50% 60% 30% 60%; }
      50% { border-radius: 50% 50% 30% 70%/40% 60% 40% 60%; }
      75% { border-radius: 40% 60% 60% 40%/60% 40% 60% 40%; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulseGlow {
      0%,100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); }
      50% { box-shadow: 0 0 0 14px rgba(59,130,246,0); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes starSpin {
      from { transform: rotate(0deg) scale(1); }
      to { transform: rotate(360deg) scale(1.1); }
    }

    .animate-float { animation: float 4s ease-in-out infinite; }
    .animate-blob { animation: blob 9s ease-in-out infinite; }
    .animate-fadeInUp { animation: fadeInUp 0.7s ease-out forwards; }
    .animate-slideInRight { animation: slideInRight 0.6s ease-out forwards; }
    .animate-pulseGlow { animation: pulseGlow 2.2s ease-in-out infinite; }

    .hero-bg {
      background: radial-gradient(ellipse at 20% 50%, #EFF6FF 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, #F0FDF4 0%, transparent 60%),
                  radial-gradient(ellipse at 50% 90%, #FFF7ED 0%, transparent 60%),
                  #FAFCFF;
    }

    .glass {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .nav-link {
      position: relative;
      transition: color 0.2s;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 50%;
      width: 0; height: 2.5px;
      background: linear-gradient(90deg,#3B82F6,#10B981);
      border-radius: 99px;
      transition: width 0.3s ease, left 0.3s ease;
    }
    .nav-link:hover::after { width: 100%; left: 0; }

    .course-card {
      transition: transform 0.3s cubic-bezier(.175,.885,.32,1.275), box-shadow 0.3s ease;
    }
    .course-card:hover { transform: translateY(-10px) scale(1.01); }

    .accordion-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.45s cubic-bezier(0,1,0,1);
    }
    .accordion-body.open {
      max-height: 600px;
      transition: max-height 0.55s cubic-bezier(.895,.03,.685,.22);
    }

    .quiz-opt {
      transition: all 0.2s cubic-bezier(.175,.885,.32,1.275);
    }
    .quiz-opt:hover { transform: scale(1.02); }
    .quiz-opt.selected {
      border-color: #3B82F6;
      background: linear-gradient(135deg, #EFF6FF, #E0F2FE);
      box-shadow: 0 4px 20px rgba(59,130,246,0.25);
    }

    .step-circle {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .step-circle:hover {
      transform: scale(1.12);
      box-shadow: 0 8px 24px rgba(59,130,246,0.25);
    }

    .shimmer-btn {
      background: linear-gradient(90deg, #3B82F6 0%, #6EE7B7 25%, #3B82F6 50%, #6EE7B7 75%, #3B82F6 100%);
      background-size: 200% auto;
      animation: shimmer 3s linear infinite;
    }

    .drag-zone {
      border: 3px dashed #CBD5E1;
      transition: all 0.2s ease;
    }
    .drag-zone:hover, .drag-zone.active {
      border-color: #3B82F6;
      background: #EFF6FF;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #F8FAFC; }
    ::-webkit-scrollbar-thumb { background: #BAE6FD; border-radius: 99px; }

    .tag-badge {
      font-size: 0.6rem; font-weight: 800; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 3px 10px; border-radius: 999px;
    }
  </style>

    function ytId(url) {
      const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/);
      return m ? m[1] : null;
    }

    async function cloudinaryUpload(file) {
      const fd = new FormData();
      fd.append("file", file);
      fd.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
      const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, { method:"POST", body:fd });
      const j = await res.json();
      if (j.error) throw new Error(j.error.message);
      return { url: j.secure_url, public_id: j.public_id };
    }

    // ================================================================

    function Quiz({ lang }) {
      const t = T[lang].quiz;
      const courses = T[lang].courses.items;
      const [step, setStep] = React.useState(0);
      const [answers, setAnswers] = React.useState([]);
      const [sel, setSel] = React.useState(null);
      const [done, setDone] = React.useState(false);
      const [result, setResult] = React.useState(null);

      function calcResult(ans) {
        const s = [0,0,0];
        ans.forEach((a,i) => {
          if (i===0) { if(a<=1) s[0]+=3; else if(a===2) s[1]+=3; else s[2]+=3; }
          if (i===1) { if(a===0) s[0]+=2; else if(a===1||a===2) s[2]+=2; else s[1]+=1; }
          if (i===2) { s[Math.min(a,2)]++; }
          if (i===3) { if(a===0) s[0]++; else if(a===1||a===3) s[1]++; else s[2]++; }
          if (i===4) { if(a===0||a===2) s[0]++; else s[1]++; }
        });
        return s.indexOf(Math.max(...s));
      }

      function next() {
        if (sel===null) return;
        const newA = [...answers, sel];
        setAnswers(newA);
        setSel(null);
        if (step===t.questions.length-1) { setResult(calcResult(newA)); setDone(true); }
        else setStep(step+1);
      }

      function back() {
        if (step===0) return;
        setStep(s=>s-1);
        setAnswers(a=>a.slice(0,-1));
        setSel(null);
      }

      function restart() {
        setStep(0); setAnswers([]); setSel(null); setDone(false); setResult(null);
      }

      const course = result!==null ? courses[result] : null;

      return (
        <section id="quiz" className="py-24 bg-white">
          <div className="max-w-2xl mx-auto px-5">
            <div className="text-center mb-12">
              <h2 className="font-display text-4xl text-slate-800 mb-3">{t.heading}</h2>
              <p className="text-slate-500 text-lg">{t.sub}</p>
            </div>

            {!done ? (
              <div className="rounded-3xl p-8 shadow-2xl border border-sky-100"
                style={{background:"linear-gradient(145deg,#F0F9FF,#F0FDF4)"}}>
                {/* Progress bar */}
                <div className="mb-8">
                  <div className="flex justify-between text-xs font-bold text-slate-400 mb-2">
                    <span>Question {step+1} / {t.questions.length}</span>
                    <span>{Math.round((step/t.questions.length)*100)}% done</span>
                  </div>
                  <div className="h-2.5 bg-slate-200 rounded-full overflow-hidden">
                    <div className="h-full rounded-full transition-all duration-600"
                      style={{width:`${(step/t.questions.length)*100}%`,
                        background:"linear-gradient(90deg,#3B82F6,#10B981)"}} />
                  </div>
                </div>

                <h3 className="font-display text-xl text-slate-800 mb-7 leading-snug">{t.questions[step].text}</h3>

                <div className="space-y-3 mb-8">
                  {t.questions[step].opts.map((opt, i) => (
                    <button key={i} onClick={() => setSel(i)}
                      className={`quiz-opt w-full text-left p-4 rounded-2xl border-2 font-semibold text-sm transition-all ${
                        sel===i ? "selected" : "border-slate-200 bg-white text-slate-700 hover:border-sky-300 hover:bg-sky-50"
                      }`}>
                      <span className="inline-flex items-center justify-center w-7 h-7 rounded-full text-xs font-extrabold mr-3"
                        style={{background: sel===i ? "#DBEAFE":"#F1F5F9",
                          color: sel===i ? "#2563EB":"#94A3B8"}}>
                        {String.fromCharCode(65+i)}
                      </span>
                      {opt}
                    </button>
                  ))}
                </div>

                <div className="flex justify-between items-center">
                  <button onClick={back} disabled={step===0}
                    className="text-slate-400 hover:text-slate-600 font-bold px-5 py-2 rounded-xl hover:bg-slate-100 transition-all disabled:opacity-30 text-sm">
                    {t.back}
                  </button>
                  <button onClick={next} disabled={sel===null}
                    className="bg-gradient-to-r from-blue-500 to-teal-500 text-white font-extrabold px-9 py-3 rounded-full shadow-md hover:shadow-xl disabled:opacity-40 transition-all hover:-translate-y-0.5 text-sm">
                    {step===t.questions.length-1 ? t.finish : t.next}
                  </button>
                </div>
              </div>
            ) : course && (
              <div className="text-center rounded-3xl p-10 shadow-2xl border-2 animate-fadeInUp"
                style={{background:course.bg, borderColor:course.border}}>
                <div className="text-7xl mb-5 animate-float">{course.emoji}</div>
                <p className="font-bold text-slate-500 mb-2 uppercase text-xs tracking-widest">{t.resultHeading}</p>
                <h3 className="font-display text-4xl text-slate-800 mb-3">{course.name}</h3>
                <span className="tag-badge inline-block mb-6" style={{background:course.border+"60",color:course.accent}}>
                  {course.level}
                </span>
                <p className="text-slate-600 mb-8 font-semibold">⏱ {course.dur} · {course.tui}</p>
                <div className="flex flex-col sm:flex-row gap-4 justify-center">
                  <a href="#courses"
                    className="font-extrabold px-9 py-3.5 rounded-full text-white shadow-lg hover:shadow-xl transition-all hover:-translate-y-1 text-sm"
                    style={{background:`linear-gradient(135deg,${course.accent},${course.border})`}}>

                  <button onClick={restart}

                    {t.restart}
                  </button>
                </div>
              </div>
            )}
          </div>
        </section>
      );
    }

    function AdminMedia({ lang }) {
      const t = T[lang].admin.media;

      const [vids, setVids] = React.useState([]);
      const [uploading, setUploading] = React.useState(false);

      const [vidUrl, setVidUrl] = React.useState("");
      const [vidTitle, setVidTitle] = React.useState("");
      const fileRef = React.useRef();

      React.useEffect(() => {
        if (!firebaseReady) return;
        const u1 = db.collection("gallery_images").orderBy("createdAt","desc").onSnapshot(s=>setImgs(s.docs.map(d=>({id:d.id,...d.data()}))));
        const u2 = db.collection("gallery_videos").orderBy("createdAt","desc").onSnapshot(s=>setVids(s.docs.map(d=>({id:d.id,...d.data()}))));
        return ()=>{ u1(); u2(); };
      }, []);

      async function handleFiles(files) {
        if (!files||!files.length) return;
        if (!firebaseReady||CLOUDINARY_CLOUD_NAME==="YOUR_CLOUD_NAME") { alert(t.noConfig); return; }
        setUploading(true);
        for (const f of Array.from(files)) {
          try {
            const {url,public_id} = await cloudinaryUpload(f);
            await db.collection("gallery_images").add({url, public_id, caption:f.name, createdAt:firebase.firestore.FieldValue.serverTimestamp()});
          } catch(e) { alert("Upload failed: "+e.message); }
        }
        setUploading(false);
      }

      async function addVideo() {
        const id = ytId(vidUrl);
        if (!id) { alert("Invalid YouTube URL"); return; }
        if (!firebaseReady) { alert(t.noConfig); return; }
        await db.collection("gallery_videos").add({youtubeUrl:vidUrl, videoId:id, title:vidTitle||"", createdAt:firebase.firestore.FieldValue.serverTimestamp()});
        setVidUrl(""); setVidTitle("");
      }

      async function delImg(id) {
        if (!confirm(t.deleteImg+"?")) return;
        await db.collection("gallery_images").doc(id).delete();
      }

      async function delVid(id) {
        if (!confirm(t.deleteVid+"?")) return;
        await db.collection("gallery_videos").doc(id).delete();
      }

      return (
        <div className="space-y-8">

              onClick={() => fileRef.current.click()}
              onDragOver={e=>{e.preventDefault();setDrag(true);}}
              onDragLeave={()=>setDrag(false)}
              onDrop={e=>{e.preventDefault();setDrag(false);handleFiles(e.dataTransfer.files);}}>
              <div className="text-5xl mb-3">{uploading?"⏳":"📤"}</div>
              <p className="text-slate-500 font-semibold text-sm">{uploading ? t.uploading : t.dragHint}</p>
              <input ref={fileRef} type="file" multiple accept="image/*" className="hidden"
                onChange={e=>handleFiles(e.target.files)} />
            </div>

            {imgs.length > 0 && (
              <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-3 mt-5">
                {imgs.map(img=>(
                  <div key={img.id} className="relative group rounded-xl overflow-hidden shadow-sm aspect-square">
                    <img src={img.url} alt="gallery" className="w-full h-full object-cover"/>
                    <button onClick={()=>delImg(img.id)}
                      className="absolute top-1 right-1 w-6 h-6 bg-red-500 text-white rounded-full text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity shadow-md">
                      ✕

                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Videos */}
          <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
            <h3 className="font-display text-xl text-slate-700 mb-5">🎬 {t.vidSection}</h3>

                className="border-2 border-slate-200 focus:border-blue-400 rounded-xl px-4 py-2.5 text-sm focus:outline-none" />
              <input value={vidUrl} onChange={e=>setVidUrl(e.target.value)} placeholder={t.urlPH}
                className="border-2 border-slate-200 focus:border-blue-400 rounded-xl px-4 py-2.5 text-sm focus:outline-none" />

              </button>
            </div>

                style={{background:c.bg, borderColor:c.border}}>
                <div className="text-4xl mb-3">{c.emoji}</div>
                <span className="tag-badge mb-2 inline-block" style={{background:c.border+"50",color:c.accent}}>{c.level}</span>
                <h4 className="font-display text-lg text-slate-800 mb-2">{c.name}</h4>
                <p className="text-sm text-slate-500">⏱ {c.dur}</p>
                <p className="text-sm text-slate-500">💰 {c.tui}</p>
                <ul className="mt-3 space-y-1">
                  {c.content.map((item,j)=>(
                    <li key={j} className="text-xs text-slate-600 flex gap-1.5 items-start">
                      <span style={{color:c.accent}}>✓</span>{item}
                    </li>
                  ))}
                </ul>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ================================================================
    //  ADMIN — DASHBOARD
    // ================================================================
    function AdminDashboard({ lang, setLang, onLogout }) {
      const t = T[lang].admin;
      const [tab, setTab] = React.useState("media");

      return (
        <div className="min-h-screen bg-slate-50">
          <header className="bg-white shadow-sm border-b border-slate-100 px-6 py-4 flex items-center justify-between sticky top-0 z-40">
            <div className="flex items-center gap-3">
              <span className="font-display text-xl text-blue-600">🔊 Be Heard</span>
              <span className="tag-badge bg-blue-100 text-blue-700">Admin</span>
            </div>
            <div className="flex items-center gap-4">
              <button onClick={()=>setLang(lang==="en"?"vi":"en")}
                className="text-xs border-2 border-sky-200 text-blue-600 font-bold px-3 py-1.5 rounded-full hover:bg-sky-50 transition-colors">
                {lang==="en"?"🇻🇳 VI":"🇺🇸 EN"}
              </button>
              <a href="#" className="text-sm text-slate-500 hover:text-blue-600 font-semibold transition-colors">{t.backToSite}</a>
              <button onClick={onLogout}
                className="text-sm text-red-500 hover:text-red-700 font-extrabold transition-colors">{t.logout}</button>
            </div>
          </header>

          <div className="max-w-5xl mx-auto px-5 py-8">
            <div className="flex gap-3 mb-8 overflow-x-auto pb-1">
              {Object.entries(t.tabs).map(([key,label])=>(
                <button key={key} onClick={()=>setTab(key)}
                  className={`px-6 py-3 rounded-2xl font-extrabold text-sm whitespace-nowrap transition-all ${
                    tab===key
                      ? "bg-gradient-to-r from-blue-500 to-teal-500 text-white shadow-md"
                      : "bg-white text-slate-600 hover:bg-sky-50 border border-slate-200"
                  }`}>
                  {label}
                </button>
              ))}
            </div>

            {tab==="media" && <AdminMedia lang={lang} />}
            {tab==="faq" && <AdminFAQ lang={lang} />}
            {tab==="courses" && <AdminCourses lang={lang} />}
          </div>
        </div>
      );
    }

    // ================================================================
    //  ADMIN SECTION (auth gate)
    // ================================================================
    function AdminSection({ lang, setLang }) {
      const [auth, setAuth] = React.useState(()=>sessionStorage.getItem("bh_adm")==="1");
      const login = () => { sessionStorage.setItem("bh_adm","1"); setAuth(true); };
      const logout = () => { sessionStorage.removeItem("bh_adm"); setAuth(false); };
      if (!auth) return <AdminLogin onLogin={login} lang={lang} />;
      return <AdminDashboard lang={lang} setLang={setLang} onLogout={logout} />;
    }

    // ================================================================
    //  ROOT APP
    // ================================================================
    function App() {
      const [hash, setHash] = React.useState(window.location.hash);
      const [lang, setLang] = React.useState("en");

      React.useEffect(()=>{
        const fn = ()=>setHash(window.location.hash);
        window.addEventListener("hashchange",fn);
        return ()=>window.removeEventListener("hashchange",fn);
      },[]);

      if (hash.startsWith("#/admin"))
        return <AdminSection lang={lang} setLang={setLang} />;

      return <PublicSite lang={lang} setLang={setLang} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
