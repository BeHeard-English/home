  <style>
    :root {
      --primary:       #031383;
      --primary-mid:   #1E2FC4;
      --primary-light: #4F5DE8;
      --primary-soft:  #EEF0FF;
      --primary-xsoft: #F5F6FF;
      --accent:        #7C6EFA;
      --accent-pink:   #FF7BAC;
      --accent-teal:   #00C6B8;
      --text-main:     #0D0F2B;
      --text-sub:      #4B5280;
      --text-muted:    #8B91BA;
      --border:        #DDE1FF;
      --white:         #FFFFFF;
    }
    html { font-size: 17px; }
    * { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 500; box-sizing: border-box; color-scheme: light; }
    .font-display { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; letter-spacing: -0.02em; }

    @keyframes float {
      0%,100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-14px) rotate(1deg); }
    }
    @keyframes blob {
      0%,100% { border-radius: 60% 40% 30% 70%/60% 30% 70% 40%; }
      25% { border-radius: 30% 60% 70% 40%/50% 60% 30% 60%; }
      50% { border-radius: 50% 50% 30% 70%/40% 60% 40% 60%; }
      75% { border-radius: 40% 60% 60% 40%/60% 40% 60% 40%; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulseGlow {
      0%,100% { box-shadow: 0 0 0 0 rgba(3,19,131,0.45); }
      50% { box-shadow: 0 0 0 18px rgba(3,19,131,0); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes starSpin {
      from { transform: rotate(0deg) scale(1); }
      to { transform: rotate(360deg) scale(1.1); }
    }

    .animate-float { animation: float 4s ease-in-out infinite; }
    .animate-blob { animation: blob 9s ease-in-out infinite; }
    .animate-fadeInUp { animation: fadeInUp 0.7s ease-out forwards; }
    .animate-slideInRight { animation: slideInRight 0.6s ease-out forwards; }
    .animate-pulseGlow { animation: pulseGlow 2.2s ease-in-out infinite; }

    .hero-bg {
      background:
        radial-gradient(ellipse at 15% 55%, rgba(3,19,131,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 15%, rgba(124,110,250,0.10) 0%, transparent 50%),
        radial-gradient(ellipse at 55% 95%, rgba(255,123,172,0.07) 0%, transparent 50%),
        var(--primary-xsoft);
    }

    .glass {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(3,19,131,0.08);
    }

    .nav-link {
      position: relative;
      transition: color 0.2s;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 50%;
      width: 0; height: 2.5px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 99px;
      transition: width 0.3s ease, left 0.3s ease;
    }
    .nav-link:hover::after { width: 100%; left: 0; }

    .course-card {
      transition: transform 0.3s cubic-bezier(.175,.885,.32,1.275), box-shadow 0.3s ease;
    }
    .course-card:hover { transform: translateY(-10px) scale(1.01); }

    .accordion-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.45s cubic-bezier(0,1,0,1);
    }
    .accordion-body.open {
      max-height: 600px;
      transition: max-height 0.55s cubic-bezier(.895,.03,.685,.22);
    }

    .quiz-opt {
      transition: all 0.2s cubic-bezier(.175,.885,.32,1.275);
    }
    .quiz-opt:hover { transform: scale(1.02); }
    .quiz-opt.selected {
      border-color: var(--primary);
      background: linear-gradient(135deg, var(--primary-xsoft), var(--primary-soft));
      box-shadow: 0 4px 24px rgba(3,19,131,0.18);
    }

    .step-circle {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .step-circle:hover {
      transform: scale(1.12);
      box-shadow: 0 8px 28px rgba(3,19,131,0.22);
    }

    .shimmer-btn {
      background: linear-gradient(90deg, #031383 0%, #7C6EFA 30%, #031383 55%, #4F5DE8 80%, #031383 100%);
      background-size: 250% auto;
      animation: shimmer 3.5s linear infinite;
    }

    .drag-zone {
      border: 3px dashed #CBD5E1;
      transition: all 0.2s ease;
    }
    .drag-zone:hover, .drag-zone.active {
      border-color: var(--primary);
      background: var(--primary-soft);
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #F8FAFC; }
    ::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 99px; }

    .tag-badge {
      font-size: 0.6rem; font-weight: 800; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 3px 10px; border-radius: 999px;
    }

    /* ── Courses grid ────────────────────────────────────── */
    .courses-grid {
      display: grid;
      gap: 0;
    }

    /* ── HScroll custom thin scrollbar ──────────────────── */
    .hscroll-track::-webkit-scrollbar {
      height: 4px;
    }
    .hscroll-track::-webkit-scrollbar-track {
      background: var(--primary-soft);
      border-radius: 99px;
      margin: 0 4px;
    }
    .hscroll-track::-webkit-scrollbar-thumb {
      background: var(--primary-light);
      border-radius: 99px;
      transition: background 0.2s;
    }
    .hscroll-track::-webkit-scrollbar-thumb:hover {
      background: var(--primary);
    }

    /* ── Section divider strip ─────────────────────────── */
    .section-divider {
      height: 4px;
      background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 50%, var(--accent-pink) 100%);
      border: none;
    }

    /* ── Card hover lift ────────────────────────────────── */
    .card-lift {
      transition: transform 0.28s cubic-bezier(.175,.885,.32,1.275), box-shadow 0.28s ease;
    }
    .card-lift:hover {
      transform: translateY(-8px);
      box-shadow: 0 24px 48px rgba(3,19,131,0.12);
    }

    /* ── Gradient text util ─────────────────────────────── */
    .text-gradient {
      background: linear-gradient(130deg, var(--primary) 0%, var(--accent) 60%, var(--accent-pink) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Nav link hover colour → navy ───────────────────── */
    .nav-link:hover { color: var(--primary) !important; }

    /* ── Button focus ring ──────────────────────────────── */
    button:focus-visible, a:focus-visible {
      outline: 2.5px solid var(--primary-light);
      outline-offset: 3px;
      border-radius: 8px;
    }

    /* ── FAQ item hover border ──────────────────────────── */
    #faq .bg-white:hover {
      border-color: var(--border) !important;
    }

    /* Vietnamese typography — đảm bảo dấu hiển thị đúng */
    :lang(vi), [lang="vi"] * {
      font-family: 'Be Vietnam Pro', sans-serif !important;
    }
    h1, h2, h3, h4, h5, h6, .font-display {
      font-family: 'Be Vietnam Pro', sans-serif;
      font-weight: 900;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body, p, span, div, a, button, input, textarea, label {
      font-family: 'Be Vietnam Pro', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>

    function ytId(url) {
      const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/);
      return m ? m[1] : null;
    }

    async function cloudinaryUpload(file) {
      const fd = new FormData();
      fd.append("file", file);
      fd.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
      // resource_type=auto lets Cloudinary detect PNG/JPG/WEBP/GIF automatically
      fd.append("resource_type", "auto");

      const res = await fetch(
        `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`,
        { method: "POST", body: fd }
      );
      const j = await res.json();
      if (j.error) {
        // Give a friendly, actionable error message
        const msg = j.error.message || "";
        if (msg.toLowerCase().includes("format") || msg.toLowerCase().includes("not allowed")) {
          throw new Error(
            `Cloudinary không cho phép định dạng này.\n\nCách fix:\n` +
            `1. Vào cloudinary.com → Settings → Upload Presets\n` +
            `2. Chỉnh sửa preset "${CLOUDINARY_UPLOAD_PRESET}"\n` +
            `3. Xoá trắng ô "Allowed formats" (để trống = chấp nhận tất cả)\n` +
            `4. Lưu lại và thử upload lại.\n\nLỗi gốc: ${msg}`
          );
        }
        throw new Error(msg);
      }
      return { url: j.secure_url, public_id: j.public_id };
    }

    // ================================================================
    //  COURSES
    // ================================================================
    function LevelCard({ lv, color, colorLight, colorBorder, t, isLast }) {
      const [open, setOpen] = React.useState(false);
      return (
        <div className="relative flex flex-col" style={{minWidth:0}}>

          {/* ── Arrow between cards — absolute, desktop only ── */}
          {!isLast && (
            <div className="hidden md:flex absolute -right-4 top-7 z-10
              w-8 h-8 rounded-full items-center justify-center font-bold text-sm shadow-sm"
              style={{background:colorLight, color:color, border:`2px solid ${colorBorder}`}}>
              →
            </div>
          )}

          {/* ── Card ─────────────────────────────────────────── */}
          <div
            className="flex-1 flex flex-col rounded-2xl border-2 overflow-hidden cursor-pointer
              transition-shadow duration-200 hover:shadow-lg mx-0 md:mx-1.5"
            style={{
              borderColor: colorBorder,
              background: "#fff",
              boxShadow: "0 2px 14px rgba(0,0,0,0.06)",
            }}
            onClick={() => setOpen(o => !o)}
          >
            {/* Row 1: LV badge + name + chevron */}
            <div className="px-4 pt-5 pb-3 flex items-center gap-3">
              <div className="flex-shrink-0 w-10 h-10 rounded-xl flex flex-col items-center
                justify-center text-white font-extrabold shadow-sm"
                style={{background:`linear-gradient(135deg, ${color}, ${color}BB)`}}>
                <span style={{fontSize:"0.45rem", opacity:0.8, letterSpacing:"0.05em"}}>LV</span>

    // ── Horizontal scroll carousel ─────────────────────────────────
    function HScroll({ children, itemWidth, gap = 16 }) {
      const trackRef = React.useRef(null);
      const [isDragging, setIsDragging] = React.useState(false);
      const [canScrollL, setCanScrollL] = React.useState(false);
      const [canScrollR, setCanScrollR] = React.useState(true);
      const drag = React.useRef({ active: false, startX: 0, scrollLeft: 0 });

      function updateArrows() {
        const el = trackRef.current;
        if (!el) return;
        setCanScrollL(el.scrollLeft > 4);
        setCanScrollR(el.scrollLeft < el.scrollWidth - el.clientWidth - 4);
      }

      React.useEffect(() => {
        const el = trackRef.current;
        if (!el) return;
        updateArrows();
        el.addEventListener("scroll", updateArrows, { passive: true });
        const ro = new ResizeObserver(updateArrows);
        ro.observe(el);
        return () => { el.removeEventListener("scroll", updateArrows); ro.disconnect(); };
      }, [children]);

      // ── Mouse drag ──────────────────────────────────────────────
      function onMouseDown(e) {
        const el = trackRef.current;
        drag.current = { active: true, startX: e.pageX - el.offsetLeft, scrollLeft: el.scrollLeft };
        setIsDragging(false);
        el.style.cursor = "grabbing";
      }
      function onMouseMove(e) {
        if (!drag.current.active) return;
        const el = trackRef.current;
        const dx = (e.pageX - el.offsetLeft) - drag.current.startX;
        if (Math.abs(dx) > 4) setIsDragging(true);
        el.scrollLeft = drag.current.scrollLeft - dx;
      }
      function onMouseUp() {
        drag.current.active = false;
        if (trackRef.current) trackRef.current.style.cursor = "grab";
        setTimeout(() => setIsDragging(false), 50);
      }

      // ── Arrow scroll ─────────────────────────────────────────────
      function scrollBy(dir) {
        const el = trackRef.current;
        if (!el) return;
        const step = itemWidth ? itemWidth + gap : el.clientWidth * 0.8;
        el.scrollBy({ left: dir * step, behavior: "smooth" });
      }

      const ArrowBtn = ({ dir, show }) => (
        <button
          onClick={() => scrollBy(dir)}
          aria-label={dir > 0 ? "Next" : "Previous"}
          style={{
            position: "absolute",
            top: "50%", transform: "translateY(-50%)",
            [dir > 0 ? "right" : "left"]: "-1rem",
            zIndex: 10,
            width: 44, height: 44,
            borderRadius: "50%",
            background: "white",
            border: "2px solid var(--border)",
            color: "var(--primary)",
            fontSize: "1.1rem",
            fontWeight: 900,
            cursor: "pointer",
            boxShadow: "0 4px 16px rgba(3,19,131,0.13)",
            opacity: show ? 1 : 0,
            pointerEvents: show ? "auto" : "none",
            transition: "opacity 0.2s ease, transform 0.15s ease",
            display: "flex", alignItems: "center", justifyContent: "center",
          }}
          onMouseEnter={e => e.currentTarget.style.transform = "translateY(-50%) scale(1.1)"}
          onMouseLeave={e => e.currentTarget.style.transform = "translateY(-50%) scale(1)"}
        >
          {dir > 0 ? "›" : "‹"}
        </button>
      );

      return (
        <div style={{position:"relative", margin:"0 1rem"}}>
          <ArrowBtn dir={-1} show={canScrollL} />
          <div
            ref={trackRef}
            onMouseDown={onMouseDown}
            onMouseMove={onMouseMove}
            onMouseUp={onMouseUp}
            onMouseLeave={onMouseUp}
            className="hscroll-track"
            style={{
              display: "flex",
              gap: gap + "px",
              overflowX: "auto",
              overflowY: "hidden",
              scrollSnapType: "x mandatory",
              WebkitOverflowScrolling: "touch",
              cursor: "grab",
              paddingBottom: 16,
              paddingLeft: 4,
              paddingRight: 4,
              scrollbarWidth: "thin",
              scrollbarColor: "var(--primary-light) var(--primary-soft)",
              userSelect: "none",
            }}
          >
            {React.Children.map(children, child => (
              <div style={{
                flexShrink: 0,
                width: itemWidth || "auto",
                scrollSnapAlign: "start",
                pointerEvents: isDragging ? "none" : "auto",
              }}>
                {child}
              </div>
            ))}
          </div>
          <ArrowBtn dir={1} show={canScrollR} />
        </div>
      );
    }

    // ================================================================

    function Quiz({ lang }) {
      const t = T[lang].quiz;
      // Flatten all levels for quiz result mapping
      const courses = T[lang].courses.groups.flatMap(g =>
        g.levels.map(lv => ({
          ...lv,
          groupLabel: g.label,
          emoji: g.emoji,
          bg: g.colorLight,
          border: g.colorBorder,
          accent: g.color,
        }))
      );
      const [step, setStep] = React.useState(0);
      const [answers, setAnswers] = React.useState([]);
      const [sel, setSel] = React.useState(null);
      const [done, setDone] = React.useState(false);
      const [result, setResult] = React.useState(null);

      function calcResult(ans) {
        // groups: 0=basic(3lvs), 1=advanced(2lvs), 2=business(3lvs)
        // score per group
        const gs = [0, 0, 0];
        // level score within group (low/mid/high)
        let lvScore = 0;

        ans.forEach((a, i) => {
          if (i===0) { // current level
            if (a===0) { gs[0]+=3; lvScore=0; }
            else if (a===1) { gs[0]+=2; lvScore=1; }
            else if (a===2) { gs[0]+=1; gs[1]+=2; lvScore=1; }
            else { gs[1]+=3; lvScore=2; }
          }
          if (i===1) { // goal
            if (a===0) gs[0]+=2;
            else if (a===1) gs[2]+=3;
            else if (a===2) gs[1]+=2;
            else gs[0]+=1;
          }
          if (i===2) { // hours
            if (a<=1) lvScore = Math.max(0, lvScore-1);
            else lvScore = Math.min(2, lvScore+1);
          }
          if (i===3) { // hardest skill
            if (a===0||a===1) gs[0]+=1;
            else if (a===2) gs[0]+=1;
            else gs[2]+=1;
          }
          if (i===4) { // learning style
            if (a===1) gs[0]+=1;
            else if (a===2) gs[2]+=1;
          }
        });

        const bestGroup = gs.indexOf(Math.max(...gs));
        const groupLevels = T["en"].courses.groups[bestGroup].levels.length;
        const lvIdx = Math.min(lvScore, groupLevels - 1);

        // Return flat index
        const offsets = [0, 3, 5]; // cumulative level counts
        return offsets[bestGroup] + lvIdx;
      }

      function next() {
        if (sel===null) return;
        const newA = [...answers, sel];
        setAnswers(newA);
        setSel(null);
        if (step===t.questions.length-1) { setResult(calcResult(newA)); setDone(true); }
        else setStep(step+1);
      }

      function back() {
        if (step===0) return;
        setStep(s=>s-1);
        setAnswers(a=>a.slice(0,-1));
        setSel(null);
      }

      function restart() {
        setStep(0); setAnswers([]); setSel(null); setDone(false); setResult(null);
      }

      const course = result!==null ? courses[result] : null;

      return (
        <section id="quiz" className="py-24" style={{background:"#FFFFFF"}}>
          <div className="max-w-2xl mx-auto px-5">
            <div className="text-center mb-12">
              <h2 className="font-display mb-3" style={{color:"var(--text-main)", fontSize:"clamp(1.9rem, 4vw, 2.5rem)"}}>{t.heading}</h2>
              <p className="text-lg" style={{color:"var(--text-sub)"}}>{t.sub}</p>
            </div>

            {!done ? (
              <div className="rounded-3xl p-8 shadow-2xl border border-sky-100"
                style={{background:"linear-gradient(145deg, var(--primary-xsoft), var(--primary-soft))"}}>
                {/* Progress bar */}
                <div className="mb-8">
                  <div className="flex justify-between text-xs font-bold text-slate-400 mb-2">
                    <span style={{color:"var(--text-sub)"}}>Question {step+1} / {t.questions.length}</span>
                    <span>{Math.round((step/t.questions.length)*100)}% done</span>
                  </div>
                  <div className="h-2.5 bg-slate-200 rounded-full overflow-hidden">
                    <div className="h-full rounded-full transition-all duration-600"
                      style={{width:`${(step/t.questions.length)*100}%`,
                        background:"linear-gradient(90deg, var(--primary), var(--accent))"}} />
                  </div>
                </div>

                <h3 className="font-display text-xl text-slate-800 mb-7 leading-snug">{t.questions[step].text}</h3>

                <div className="space-y-3 mb-8">
                  {t.questions[step].opts.map((opt, i) => (
                    <button key={i} onClick={() => setSel(i)}
                      className={`quiz-opt w-full text-left p-4 rounded-2xl border-2 font-semibold text-sm transition-all ${
                        sel===i ? "selected" : "border-slate-200 bg-white hover:bg-sky-50"
                      }`}>
                      <span className="inline-flex items-center justify-center w-7 h-7 rounded-full text-xs font-extrabold mr-3"
                        style={{background: sel===i ? "var(--primary-soft)":"#F1F5F9",
                          color: sel===i ? "var(--primary)":"#94A3B8"}}>
                        {String.fromCharCode(65+i)}
                      </span>
                      {opt}
                    </button>
                  ))}
                </div>

                <div className="flex justify-between items-center">
                  <button onClick={back} disabled={step===0}
                    className="text-slate-400 hover:text-slate-600 font-bold px-5 py-2 rounded-xl hover:bg-slate-100 transition-all disabled:opacity-30 text-sm">
                    {t.back}
                  </button>
                  <button onClick={next} disabled={sel===null}
                    className="text-white font-extrabold px-9 py-3 rounded-full shadow-md hover:shadow-xl disabled:opacity-40 transition-all hover:-translate-y-0.5 text-sm" style={{background:"linear-gradient(135deg, var(--primary), var(--accent))"}}>
                    {step===t.questions.length-1 ? t.finish : t.next}
                  </button>
                </div>
              </div>
            ) : course && (
              <div className="text-center rounded-3xl p-10 shadow-2xl border-2 animate-fadeInUp"
                style={{background:course.bg, borderColor:course.border}}>
                <div className="text-6xl mb-4 animate-float">{course.emoji}</div>
                <p className="font-bold mb-1 uppercase text-xs tracking-widest" style={{color:"var(--text-muted)"}}>{t.resultHeading}</p>
                <p className="text-sm font-extrabold mb-2" style={{color:course.accent}}>{course.groupLabel}</p>
                <h3 className="font-display mb-3" style={{color:"var(--text-main)", fontSize:"clamp(1.7rem, 4vw, 2.2rem)"}}>{course.name}</h3>
                <span className="tag-badge inline-block mb-5" style={{background:course.border+"60", color:course.accent}}>
                  {course.level}
                </span>
                <p className="mb-7 font-semibold" style={{color:"var(--text-sub)"}}>⏱ {course.dur} · {course.tui}</p>
                <div className="flex flex-col sm:flex-row gap-4 justify-center">
                  <a href="#courses"
                    className="font-extrabold px-9 py-3.5 rounded-full text-white shadow-lg hover:shadow-xl transition-all hover:-translate-y-1 text-sm"
                    style={{background:`linear-gradient(135deg,${course.accent},${course.border})`}}>
                    {T[lang].courses.enroll}
                  </a>
                  <button onClick={restart}
                    className="border-2 border-slate-300 text-slate-600 font-extrabold px-9 py-3.5 rounded-full hover:bg-white transition-all text-sm">
                    {t.restart}
                  </button>
                </div>
              </div>
            )}
          </div>
        </section>
      );
    }

    function AdminLogin({ lang }) {
      const t = T[lang].admin;
      const [email, setEmail] = React.useState("");
      const [pw, setPw] = React.useState("");
      const [show, setShow] = React.useState(false);
      const [loading, setLoading] = React.useState(false);
      const [err, setErr] = React.useState("");

      async function handleSubmit(e) {
        e.preventDefault();
        if (!email || !pw) { setErr("Vui lòng điền đầy đủ email và mật khẩu."); return; }
        setLoading(true);
        setErr("");
        try {
          await firebase.auth().signInWithEmailAndPassword(email.trim(), pw);
          // onAuthStateChanged in AdminSection will handle the redirect
        } catch(e) {
          const code = e.code || "";
          if (code.includes("user-not-found") || code.includes("wrong-password") || code.includes("invalid-credential")) {
            setErr(t.wrongPw);
          } else if (code.includes("operation-not-allowed") || code.includes("configuration-not-found")) {
            setErr(t.noAuth);
          } else if (code.includes("too-many-requests")) {
            setErr("⏳ Quá nhiều lần thử. Vui lòng đợi vài phút rồi thử lại.");
          } else {
            setErr("Lỗi: " + (e.message || code));
          }
          setPw("");
        }
        setLoading(false);
      }

      return (
        <div className="min-h-screen hero-bg flex items-center justify-center px-4">
          <div className="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-sm border border-sky-100">
            <div className="text-center mb-8">
              <div className="text-5xl mb-3">🔐</div>
              <h2 className="font-display text-2xl text-slate-800">{t.title}</h2>
              <p className="text-slate-400 text-sm mt-1">Be Heard Admin Panel</p>
            </div>

            <form onSubmit={handleSubmit} className="space-y-3">
              {/* Email */}
              <div>
                <label className="text-xs font-bold text-slate-400 mb-1 block uppercase tracking-wider">
                  {t.emailLabel}
                </label>
                <input
                  type="email" value={email} onChange={e=>setEmail(e.target.value)}
                  placeholder="admin@beheard.vn" autoComplete="email"
                  className="w-full border-2 border-slate-200 focus:border-blue-400 rounded-2xl px-4 py-3.5 text-sm focus:outline-none transition-colors"
                />
              </div>

              {/* Password */}
              <div>
                <label className="text-xs font-bold text-slate-400 mb-1 block uppercase tracking-wider">
                  {t.pwLabel}
                </label>
                <div className="relative">
                  <input
                    type={show ? "text" : "password"} value={pw} onChange={e=>setPw(e.target.value)}
                    placeholder="••••••••" autoComplete="current-password"
                    className="w-full border-2 border-slate-200 focus:border-blue-400 rounded-2xl px-4 py-3.5 pr-12 text-sm focus:outline-none transition-colors"
                  />
                  <button type="button" onClick={()=>setShow(!show)}
                    className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 text-lg">
                    {show ? "🙈" : "👁"}
                  </button>
                </div>
              </div>

              {/* Error */}
              {err && (
                <div className="bg-red-50 border border-red-200 rounded-xl px-4 py-3 text-red-600 text-xs font-semibold leading-relaxed">
                  {err}
                  {err === t.noAuth && (
                    <div className="mt-2 bg-white rounded-lg p-3 text-slate-600 space-y-1">
                      <p className="font-bold text-slate-700">📋 Cách bật Firebase Auth:</p>
                      <p>1. Vào <strong>Firebase Console</strong> → project của bạn</p>
                      <p>2. Chọn <strong>Authentication</strong> → <strong>Sign-in method</strong></p>
                      <p>3. Bật <strong>Email/Password</strong></p>
                      <p>4. Vào tab <strong>Users</strong> → <strong>Add user</strong></p>
                      <p>5. Nhập email + password cho tài khoản admin</p>
                    </div>
                  )}
                </div>
              )}

              <button type="submit" disabled={loading}
                className="w-full text-white font-extrabold py-3.5 rounded-2xl hover:shadow-xl transition-all hover:-translate-y-0.5 disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2" style={{background:"linear-gradient(135deg, var(--primary), var(--primary-light))"}}>
                {loading ? (
                  <><span className="animate-spin inline-block">⏳</span> Đang đăng nhập...</>
                ) : t.loginBtn}
              </button>
            </form>

            <div className="text-center mt-6">
              <a href="#" className="text-slate-400 text-sm hover:text-blue-500 transition-colors">{t.backToSite}</a>
            </div>
          </div>
        </div>
      );
    }

    // ================================================================
    //  ADMIN — MEDIA MANAGER
    // ================================================================
    function AdminMedia({ lang }) {
      const t = T[lang].admin.media;
      const [imgs, setImgs] = React.useState([]);
      const [vids, setVids] = React.useState([]);
      const [uploading, setUploading] = React.useState(false);
      const [uploadProgress, setUploadProgress] = React.useState({ done: 0, total: 0 });
      const [drag, setDrag] = React.useState(false);
      const [vidUrl, setVidUrl] = React.useState("");
      const [vidTitle, setVidTitle] = React.useState("");
      const [errorMsg, setErrorMsg] = React.useState(null);
      const [successMsg, setSuccessMsg] = React.useState(null);
      const fileRef = React.useRef();

      function showSuccess(msg) {
        setSuccessMsg(msg);
        setTimeout(() => setSuccessMsg(null), 3500);
      }
      function showError(msg) { setErrorMsg(msg); }

      React.useEffect(() => {
        if (!firebaseReady) return;
        const u1 = db.collection("gallery_images").orderBy("createdAt","desc").onSnapshot(s=>setImgs(s.docs.map(d=>({id:d.id,...d.data()}))));
        const u2 = db.collection("gallery_videos").orderBy("createdAt","desc").onSnapshot(s=>setVids(s.docs.map(d=>({id:d.id,...d.data()}))));
        return ()=>{ u1(); u2(); };
      }, []);

      async function handleFiles(files) {
        if (!files||!files.length) return;
        if (!firebaseReady||CLOUDINARY_CLOUD_NAME==="YOUR_CLOUD_NAME") { showError(t.noConfig); return; }
        // Accept common image formats
        const allowed = ["image/png","image/jpeg","image/jpg","image/webp","image/gif","image/heic","image/heif"];
        const validFiles = Array.from(files).filter(f => {
          if (!allowed.includes(f.type) && !f.name.match(/\.(png|jpg|jpeg|webp|gif|heic|heif)$/i)) {
            showError(`❌ File "${f.name}" không được hỗ trợ. Chỉ chấp nhận: PNG, JPG, WEBP, GIF`);
            return false;
          }
          return true;
        });
        if (!validFiles.length) return;
        setUploading(true);
        setUploadProgress({ done: 0, total: validFiles.length });
        let successCount = 0;
        for (const f of validFiles) {
          try {
            const {url,public_id} = await cloudinaryUpload(f);
            await db.collection("gallery_images").add({
              url, public_id,
              caption: f.name.replace(/\.[^.]+$/, ""),
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            successCount++;
            setUploadProgress(p => ({ ...p, done: p.done + 1 }));
          } catch(e) {
            showError(e.message);
            setUploading(false);
            return;
          }
        }
        setUploading(false);
        if (successCount > 0) showSuccess(`✅ Đã tải lên ${successCount} ảnh thành công!`);
      }

      async function addVideo() {
        const id = ytId(vidUrl);
        if (!id) { showError("❌ Link YouTube không hợp lệ. Ví dụ: https://youtu.be/xxxxx"); return; }
        if (!firebaseReady) { showError(t.noConfig); return; }
        await db.collection("gallery_videos").add({youtubeUrl:vidUrl, videoId:id, title:vidTitle||"", createdAt:firebase.firestore.FieldValue.serverTimestamp()});
        setVidUrl(""); setVidTitle("");
        showSuccess("✅ Đã thêm video thành công!");
      }

      async function delImg(id) {
        if (!confirm(t.deleteImg+"?")) return;
        await db.collection("gallery_images").doc(id).delete();
      }

      async function delVid(id) {
        if (!confirm(t.deleteVid+"?")) return;
        await db.collection("gallery_videos").doc(id).delete();
      }

      return (
        <div className="space-y-8">

          {/* Error modal */}
          {errorMsg && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:"rgba(0,0,0,0.4)"}}>
              <div className="bg-white rounded-3xl shadow-2xl p-7 max-w-md w-full border-2 border-red-200">
                <div className="text-4xl mb-3 text-center">⚠️</div>
                <p className="font-extrabold text-red-600 mb-3 text-center text-sm">Lỗi Upload</p>
                <pre className="bg-red-50 text-red-700 text-xs rounded-xl p-4 whitespace-pre-wrap leading-relaxed mb-5 max-h-60 overflow-y-auto">
                  {errorMsg}
                </pre>
                <button onClick={() => setErrorMsg(null)}
                  className="w-full bg-red-500 hover:bg-red-600 text-white font-extrabold py-3 rounded-2xl transition-colors text-sm">
                  Đóng
                </button>
              </div>
            </div>
          )}

          {/* Success toast */}
          {successMsg && (
            <div className="fixed bottom-6 right-6 z-50 bg-green-50 border-2 border-green-200 text-green-700 font-bold text-sm px-6 py-3 rounded-2xl shadow-xl animate-fadeInUp">
              {successMsg}
            </div>
          )}

          {/* Images */}
          <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
            <h3 className="font-display text-xl text-slate-700 mb-1">📸 {t.imgSection}</h3>
            <p className="text-xs text-slate-400 mb-4 font-semibold">Hỗ trợ: PNG · JPG · WEBP · GIF · HEIC</p>
            <div
              className={`drag-zone rounded-2xl p-12 text-center cursor-pointer ${drag?"active":""}`}
              onClick={() => fileRef.current.click()}
              onDragOver={e=>{e.preventDefault();setDrag(true);}}
              onDragLeave={()=>setDrag(false)}
              onDrop={e=>{e.preventDefault();setDrag(false);handleFiles(e.dataTransfer.files);}}>
              <div className="text-5xl mb-3">{uploading?"⏳":"📤"}</div>
              {uploading ? (
                <div>
                  <p className="text-blue-600 font-extrabold text-sm mb-2">{t.uploading}</p>
                  <p className="text-slate-400 text-xs">{uploadProgress.done} / {uploadProgress.total} ảnh</p>
                  <div className="mt-3 h-2 bg-slate-200 rounded-full overflow-hidden w-48 mx-auto">
                    <div className="h-full bg-gradient-to-r from-blue-400 to-teal-400 rounded-full transition-all"
                      style={{width: uploadProgress.total ? `${(uploadProgress.done/uploadProgress.total)*100}%` : "0%"}} />
                  </div>
                </div>
              ) : (
                <p className="text-slate-500 font-semibold text-sm">{t.dragHint}</p>
              )}
              <input ref={fileRef} type="file" multiple accept="image/png,image/jpeg,image/jpg,image/webp,image/gif,image/heic,image/heif,.png,.jpg,.jpeg,.webp,.gif,.heic" className="hidden"
                onChange={e=>handleFiles(e.target.files)} />
            </div>

            {imgs.length > 0 && (
              <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-3 mt-5">
                {imgs.map(img=>(
                  <div key={img.id} className="relative group rounded-xl overflow-hidden shadow-sm aspect-square">
                    <img src={img.url} alt="gallery" className="w-full h-full object-cover"/>
                    <button onClick={()=>delImg(img.id)}
                      className="absolute top-1 right-1 w-6 h-6 bg-red-500 text-white rounded-full text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity shadow-md">
                      ✕
                    </button>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Videos */}
          <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
            <h3 className="font-display text-xl text-slate-700 mb-5">🎬 {t.vidSection}</h3>
            <div className="grid sm:grid-cols-3 gap-3 mb-4">
              <input value={vidTitle} onChange={e=>setVidTitle(e.target.value)} placeholder={t.titlePH}
                className="border-2 border-slate-200 focus:border-blue-400 rounded-xl px-4 py-2.5 text-sm focus:outline-none" />
              <input value={vidUrl} onChange={e=>setVidUrl(e.target.value)} placeholder={t.urlPH}
                className="border-2 border-slate-200 focus:border-blue-400 rounded-xl px-4 py-2.5 text-sm focus:outline-none" />
              <button onClick={addVideo}
                className="text-white font-extrabold rounded-xl px-5 py-2.5 text-sm transition-all hover:opacity-90" style={{background:"var(--primary)"}}>
                {t.addBtn}
              </button>
            </div>

            {vids.length > 0 && (
              <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mt-4">
                {vids.map(vid=>(
                  <div key={vid.id} className="relative group rounded-2xl overflow-hidden border border-slate-100 shadow-sm">
                    <img src={`https://img.youtube.com/vi/${vid.videoId}/mqdefault.jpg`}
                      alt={vid.title} className="w-full h-24 object-cover"/>
                    <div className="p-2 flex items-center gap-1">
                      <p className="text-xs text-slate-600 font-semibold truncate flex-1">{vid.title||vid.videoId}</p>
                      <button onClick={()=>delVid(vid.id)} className="text-red-400 hover:text-red-600 text-xs font-bold flex-shrink-0">✕</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ================================================================
    //  ADMIN — FAQ MANAGER
    // ================================================================
    function AdminFAQ({ lang }) {
      const t = T[lang].admin.faq;
      const [items, setItems] = React.useState([]);
      const [showForm, setShowForm] = React.useState(false);
      const [editId, setEditId] = React.useState(null);
      const blank = {question_en:"",question_vi:"",answer_en:"",answer_vi:""};
      const [form, setForm] = React.useState(blank);

      React.useEffect(() => {
        if (!firebaseReady) return;
        const u = db.collection("faqs").orderBy("order","asc")
          .onSnapshot(s=>setItems(s.docs.map(d=>({id:d.id,...d.data()}))), ()=>{});
        return ()=>u();
      }, []);

      async function save() {
        if (!firebaseReady) { alert("Firebase not configured"); return; }
        if (editId) {
          await db.collection("faqs").doc(editId).update(form);
        } else {
          await db.collection("faqs").add({...form, order:items.length});
        }
        setShowForm(false); setEditId(null); setForm(blank);
      }

      function startEdit(item) {
        setEditId(item.id);
        setForm({question_en:item.question_en||"",question_vi:item.question_vi||"",answer_en:item.answer_en||"",answer_vi:item.answer_vi||""});
        setShowForm(true);
      }

      async function del(id) {
        if (!confirm("Delete this FAQ?")) return;
        await db.collection("faqs").doc(id).delete();
      }

      return (
        <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
          <div className="flex items-center justify-between mb-6">
            <h3 className="font-display text-xl text-slate-700">❓ {t.title}</h3>
            <button onClick={()=>{setShowForm(true);setEditId(null);setForm(blank);}}
              className="text-white text-sm font-extrabold px-5 py-2.5 rounded-xl transition-all hover:opacity-90" style={{background:"var(--primary)"}}>
              {t.addBtn}
            </button>
          </div>

          {showForm && (
            <div className="bg-sky-50 rounded-2xl p-5 mb-6 border-2 border-sky-200 space-y-3">
              <div className="grid md:grid-cols-2 gap-3">
                <div>
                  <label className="text-xs font-bold text-slate-400 mb-1 block">{t.qEn}</label>
                  <textarea value={form.question_en} onChange={e=>setForm({...form,question_en:e.target.value})} rows="2"
                    className="w-full border-2 border-slate-200 focus:border-blue-400 rounded-xl p-3 text-sm focus:outline-none resize-none" />
                </div>
                <div>
                  <label className="text-xs font-bold text-slate-400 mb-1 block">{t.qVi}</label>
                  <textarea value={form.question_vi} onChange={e=>setForm({...form,question_vi:e.target.value})} rows="2"
                    className="w-full border-2 border-slate-200 focus:border-blue-400 rounded-xl p-3 text-sm focus:outline-none resize-none" />
                </div>
                <div>
                  <label className="text-xs font-bold text-slate-400 mb-1 block">{t.aEn}</label>
                  <textarea value={form.answer_en} onChange={e=>setForm({...form,answer_en:e.target.value})} rows="3"
                    className="w-full border-2 border-slate-200 focus:border-blue-400 rounded-xl p-3 text-sm focus:outline-none resize-none" />
                </div>
                <div>
                  <label className="text-xs font-bold text-slate-400 mb-1 block">{t.aVi}</label>
                  <textarea value={form.answer_vi} onChange={e=>setForm({...form,answer_vi:e.target.value})} rows="3"
                    className="w-full border-2 border-slate-200 focus:border-blue-400 rounded-xl p-3 text-sm focus:outline-none resize-none" />
                </div>
              </div>
              <div className="flex gap-3">
                <button onClick={save}
                  className="text-white font-extrabold px-6 py-2 rounded-xl text-sm transition-all hover:opacity-90" style={{background:"#16A34A"}}>
                  {t.save}
                </button>
                <button onClick={()=>setShowForm(false)}
                  className="border-2 border-slate-200 text-slate-600 font-extrabold px-6 py-2 rounded-xl text-sm hover:bg-slate-50 transition-colors">
                  {t.cancel}
                </button>
              </div>
            </div>
          )}

          {items.length === 0 ? (
            <div className="text-center py-10 text-slate-400">
              <div className="text-4xl mb-3">❓</div>
              <p className="text-sm">{t.noItems}</p>
            </div>
          ) : (
            <div className="space-y-3">
              {items.map(item=>(
                <div key={item.id}
                  className="flex items-start gap-3 p-4 border border-slate-100 rounded-2xl hover:bg-slate-50 transition-colors">
                  <div className="flex-1 min-w-0">
                    <p className="font-bold text-sm text-slate-800 truncate">{item.question_en}</p>
                    <p className="text-xs text-slate-400 truncate mt-0.5">{item.question_vi}</p>
                  </div>
                  <div className="flex gap-2 flex-shrink-0">
                    <button onClick={()=>startEdit(item)}
                      className="text-xs font-extrabold text-blue-500 hover:text-blue-700 px-3 py-1.5 rounded-lg hover:bg-blue-50 transition-colors">
                      {t.edit}
                    </button>
                    <button onClick={()=>del(item.id)}
                      className="text-xs font-extrabold text-red-500 hover:text-red-700 px-3 py-1.5 rounded-lg hover:bg-red-50 transition-colors">
                      {t.del}
                    </button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ================================================================
    //  ADMIN — COURSES (Read-only overview for now)
    // ================================================================
    function AdminCourses({ lang }) {
      const t = T[lang].courses;
      const [activeGroup, setActiveGroup] = React.useState(0);
      return (
        <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
          <h3 className="font-display text-xl mb-2" style={{color:"var(--text-main)"}}>📚 {T[lang].admin.tabs.courses}</h3>
          <p className="text-sm mb-5 rounded-xl px-4 py-3" style={{background:"#FFF7ED", border:"1px solid #FED7AA", color:"#92400E"}}>
            💡 Nội dung khóa học được khai báo trong object <code style={{background:"#FEF3C7", padding:"1px 6px", borderRadius:4}}>T</code> trong source code. Chỉnh sửa trực tiếp ở đó rồi save lại.
          </p>

          {/* Group tabs */}
          <div className="flex flex-wrap gap-2 mb-5">
            {t.groups.map((g, i) => (
              <button key={g.id} onClick={() => setActiveGroup(i)}
                className="px-4 py-2 rounded-xl font-bold text-sm transition-all border"
                style={activeGroup === i
                  ? {background:g.color, color:"#fff", borderColor:g.color}
                  : {background:g.colorLight, color:g.color, borderColor:g.colorBorder}}>
                {g.emoji} {g.label}
              </button>
            ))}
          </div>

          {/* Levels */}
          <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
            {t.groups[activeGroup].levels.map((lv, i) => {
              const g = t.groups[activeGroup];
              return (
                <div key={i} className="rounded-2xl p-4 border-2" style={{background:g.colorLight, borderColor:g.colorBorder}}>
                  <div className="flex items-center gap-2 mb-2">
                    <span className="w-7 h-7 rounded-lg text-white text-xs font-extrabold flex items-center justify-center"
                      style={{background:g.color}}>L{lv.levelNum}</span>
                    <span className="font-extrabold text-sm" style={{color:"var(--text-main)"}}>{lv.name}</span>
                    {lv.featured && <span className="text-xs">⭐</span>}
                  </div>
                  <span className="tag-badge inline-block mb-2" style={{background:g.colorBorder+"80", color:g.color}}>{lv.level}</span>
                  <p className="text-xs font-semibold mb-1" style={{color:"var(--text-muted)"}}>⏱ {lv.dur} · 💰 {lv.tui}</p>
                  <ul className="mt-2 space-y-1">
                    {lv.content.map((item,j)=>(
                      <li key={j} className="text-xs flex gap-1.5 items-start" style={{color:"var(--text-sub)"}}>
                        <span style={{color:g.color}} className="flex-shrink-0">✓</span>{item}
                      </li>
                    ))}
                  </ul>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ================================================================
    //  ADMIN — DASHBOARD
    // ================================================================
    function AdminDashboard({ lang, setLang, onLogout, user }) {
      const t = T[lang].admin;
      const [tab, setTab] = React.useState("media");

      return (
        <div className="min-h-screen bg-slate-50">
          <header className="bg-white shadow-sm border-b border-slate-100 px-6 py-4 flex items-center justify-between sticky top-0 z-40">
            <div className="flex items-center gap-3">
              <span className="font-display text-xl" style={{color:"var(--primary)"}}>🔊 Be Heard</span>
              <span className="tag-badge bg-blue-100 text-blue-700">Admin</span>
            </div>
            <div className="flex items-center gap-4">
              <button onClick={()=>setLang(lang==="en"?"vi":"en")}
                className="text-xs border-2 border-sky-200 text-blue-600 font-bold px-3 py-1.5 rounded-full hover:bg-sky-50 transition-colors">
                {lang==="en"?"🇻🇳 VI":"🇺🇸 EN"}
              </button>
              <a href="#" className="text-sm text-slate-500 hover:text-blue-600 font-semibold transition-colors">{t.backToSite}</a>
              <div className="flex items-center gap-3">
                {user && (
                  <span className="text-xs text-slate-400 font-semibold hidden sm:block">
                    👤 {user.email}
                  </span>
                )}
                <button onClick={onLogout}
                  className="text-sm text-red-500 hover:text-red-700 font-extrabold transition-colors border border-red-200 hover:border-red-400 px-3 py-1.5 rounded-xl">
                  {t.logout}
                </button>
              </div>
            </div>
          </header>

          <div className="max-w-5xl mx-auto px-5 py-8">
            <div className="flex gap-3 mb-8 overflow-x-auto pb-1">
              {Object.entries(t.tabs).map(([key,label])=>(
                <button key={key} onClick={()=>setTab(key)}
                  className={`px-6 py-3 rounded-2xl font-extrabold text-sm whitespace-nowrap transition-all ${tab===key ? "text-white shadow-md" : "bg-white hover:bg-sky-50 border border-slate-200"}`}
                  style={tab===key ? {background:"linear-gradient(135deg, var(--primary), var(--primary-light))"} : {color:"var(--text-sub)"}}>
                  {label}
                </button>
              ))}
            </div>

            {tab==="media" && <AdminMedia lang={lang} />}
            {tab==="faq" && <AdminFAQ lang={lang} />}
            {tab==="courses" && <AdminCourses lang={lang} />}
          </div>
        </div>
      );
    }

    // ================================================================
    //  ADMIN SECTION (auth gate)
    // ================================================================
    function AdminSection({ lang, setLang }) {
      // null = loading, false = not logged in, object = logged in user
      const [user, setUser] = React.useState(null);
      const [checking, setChecking] = React.useState(true);

      React.useEffect(() => {
        if (!firebaseReady) { setChecking(false); return; }
        const unsub = firebase.auth().onAuthStateChanged(u => {
          setUser(u || false);
          setChecking(false);
        });
        return () => unsub();
      }, []);

      async function logout() {
        await firebase.auth().signOut();
        // onAuthStateChanged will set user=false automatically
      }

      if (checking) return (
        <div className="min-h-screen hero-bg flex items-center justify-center">
          <div className="text-center">
            <div className="text-5xl mb-4 animate-pulse">🔐</div>
            <p className="text-slate-400 font-semibold">Đang kiểm tra phiên đăng nhập...</p>
          </div>
        </div>
      );

      if (!user) return <AdminLogin lang={lang} />;
      return <AdminDashboard lang={lang} setLang={setLang} onLogout={logout} user={user} />;
    }

    // ================================================================
    //  ROOT APP
    // ================================================================
    // Firebase status banner
    function FirebaseBanner() {
      const [visible, setVisible] = React.useState(true);
      if (!visible) return null;
      if (firebaseReady) {
        // Show briefly then auto-hide
        setTimeout(() => setVisible(false), 3500);
        return (
          <div style={{position:"fixed",bottom:20,right:20,zIndex:9999,
            background:"#ECFDF5",border:"2px solid #6EE7B7",
            borderRadius:16,padding:"12px 18px",boxShadow:"0 8px 30px #0002",
            display:"flex",alignItems:"center",gap:10,fontSize:13,fontWeight:700,color:"#065F46",
            animation:"fadeInUp 0.4s ease-out forwards"}}>
            ✅ Firebase connected!
            <button onClick={()=>setVisible(false)} style={{marginLeft:8,opacity:0.5,cursor:"pointer",fontWeight:900,fontSize:15}}>✕</button>
          </div>
        );
      }
      if (_fbErr) return (
        <div style={{position:"fixed",bottom:20,right:20,zIndex:9999,
          background:"#FFF1F2",border:"2px solid #FECDD3",
          borderRadius:16,padding:"14px 18px",boxShadow:"0 8px 30px #0002",maxWidth:360,fontSize:12,color:"#9F1239"}}>
          <p style={{fontWeight:900,fontSize:14,marginBottom:6}}>❌ Firebase Error</p>
          <p style={{marginBottom:8}}>{_fbErr}</p>
          <p style={{fontWeight:700,color:"#BE185D"}}>→ Check Firestore Rules in Firebase Console</p>
          <button onClick={()=>setVisible(false)} style={{marginTop:6,opacity:0.5,cursor:"pointer",fontWeight:900}}>Dismiss</button>
        </div>
      );
      return null;
    }

    function App() {
      const [hash, setHash] = React.useState(window.location.hash);
      const [lang, setLang] = React.useState("en");

      React.useEffect(()=>{
        const fn = ()=>setHash(window.location.hash);
        window.addEventListener("hashchange",fn);
        return ()=>window.removeEventListener("hashchange",fn);
      },[]);

      // Cập nhật lang attribute để browser biết ngôn ngữ → render dấu đúng
      React.useEffect(()=>{
        document.documentElement.lang = lang === "vi" ? "vi" : "en";
      }, [lang]);

      if (hash.startsWith("#/admin"))
        return <><FirebaseBanner /><AdminSection lang={lang} setLang={setLang} /></>;

      return <><FirebaseBanner /><PublicSite lang={lang} setLang={setLang} /></>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
