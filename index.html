    @keyframes fadeInUp {

    @keyframes shimmer {

    }
    @keyframes starSpin {
      from { transform: rotate(0deg) scale(1); }

    .animate-float { animation: float 4s ease-in-out infinite; }
    .animate-blob { animation: blob 9s ease-in-out infinite; }
    .animate-fadeInUp { animation: fadeInUp 0.7s ease-out forwards; }
    .animate-slideInRight { animation: slideInRight 0.6s ease-out forwards; }
    .animate-pulseGlow { animation: pulseGlow 2.2s ease-in-out infinite; }

    .hero-bg {
      background: radial-gradient(ellipse at 20% 50%, #EFF6FF 0%, transparent 60%),

    }

    .glass {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .nav-link {
      position: relative;
      transition: color 0.2s;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 50%;
      width: 0; height: 2.5px;
      background: linear-gradient(90deg,#3B82F6,#10B981);
      border-radius: 99px;
      transition: width 0.3s ease, left 0.3s ease;
    }
    .nav-link:hover::after { width: 100%; left: 0; }

    .course-card {
      transition: transform 0.3s cubic-bezier(.175,.885,.32,1.275), box-shadow 0.3s ease;
    }
    .course-card:hover { transform: translateY(-10px) scale(1.01); }

    .accordion-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.45s cubic-bezier(0,1,0,1);
    }
    .accordion-body.open {
      max-height: 600px;
      transition: max-height 0.55s cubic-bezier(.895,.03,.685,.22);
    }

    .quiz-opt {
      transition: all 0.2s cubic-bezier(.175,.885,.32,1.275);
    }
    .quiz-opt:hover { transform: scale(1.02); }
    .quiz-opt.selected {
      border-color: #3B82F6;
      background: linear-gradient(135deg, #EFF6FF, #E0F2FE);
      box-shadow: 0 4px 20px rgba(59,130,246,0.25);
    }

    .step-circle {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .step-circle:hover {
      transform: scale(1.12);
      box-shadow: 0 8px 24px rgba(59,130,246,0.25);
    }

    .shimmer-btn {
      background: linear-gradient(90deg, #3B82F6 0%, #6EE7B7 25%, #3B82F6 50%, #6EE7B7 75%, #3B82F6 100%);
      background-size: 200% auto;
      animation: shimmer 3s linear infinite;
    }

    .drag-zone {
      border: 3px dashed #CBD5E1;
      transition: all 0.2s ease;
    }
    .drag-zone:hover, .drag-zone.active {
      border-color: #3B82F6;
      background: #EFF6FF;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #F8FAFC; }
    ::-webkit-scrollbar-thumb { background: #BAE6FD; border-radius: 99px; }

    .tag-badge {
      font-size: 0.6rem; font-weight: 800; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 3px 10px; border-radius: 999px;

    // ================================================================
    //  HELPERS
    // ================================================================
    function ytId(url) {
      const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/);
      return m ? m[1] : null;
    }

    async function cloudinaryUpload(file) {
      const fd = new FormData();
      fd.append("file", file);
      fd.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
      // resource_type=auto lets Cloudinary detect PNG/JPG/WEBP/GIF automatically
      fd.append("resource_type", "auto");

      const res = await fetch(
        `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`,
        { method: "POST", body: fd }
      );
      const j = await res.json();
      if (j.error) {
        // Give a friendly, actionable error message
        const msg = j.error.message || "";
        if (msg.toLowerCase().includes("format") || msg.toLowerCase().includes("not allowed")) {
          throw new Error(
            `Cloudinary không cho phép định dạng này.\n\nCách fix:\n` +
            `1. Vào cloudinary.com → Settings → Upload Presets\n` +
            `2. Chỉnh sửa preset "${CLOUDINARY_UPLOAD_PRESET}"\n` +
            `3. Xoá trắng ô "Allowed formats" (để trống = chấp nhận tất cả)\n` +
            `4. Lưu lại và thử upload lại.\n\nLỗi gốc: ${msg}`
          );
        }
        throw new Error(msg);
      }
      return { url: j.secure_url, public_id: j.public_id };
    }

    function Navbar({ lang, setLang }) {
      const t = T[lang].nav;
      const [scrolled, setScrolled] = React.useState(false);
      const [open, setOpen] = React.useState(false);

      React.useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 30);
        window.addEventListener("scroll", fn);
        return () => window.removeEventListener("scroll", fn);
      }, []);

      const links = ["home","courses","roadmap","gallery","faq","quiz"];

      return (
        <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-400 ${scrolled ? "glass shadow-lg py-2" : "py-4"}`}>
          <div className="max-w-6xl mx-auto px-5 flex items-center justify-between">
            <a href="#home" className="font-display text-2xl text-blue-600 flex items-center gap-2 hover:scale-105 transition-transform">
              🔊 Be Heard
            </a>

            <div className="hidden md:flex items-center gap-7 text-sm font-semibold">
              {links.map(s => (
                <a key={s} href={`#${s}`} className="nav-link text-slate-600 hover:text-blue-600 capitalize">{t[s]}</a>
              ))}
              <a href="#/admin" className="text-xs text-slate-400 hover:text-blue-400 transition-colors">{t.admin}</a>
            </div>

            <div className="flex items-center gap-3">

                className="flex items-center gap-1.5 bg-white border-2 border-sky-200 rounded-full px-3 py-1.5 text-xs font-extrabold text-blue-600 hover:bg-sky-50 hover:border-blue-400 transition-all shadow-sm"
              >

              </button>
              <button className="md:hidden w-9 h-9 rounded-xl bg-sky-100 text-blue-600 flex items-center justify-center font-bold"
                onClick={() => setOpen(!open)}>
                {open ? "✕" : "≡"}
              </button>
            </div>
          </div>
          {open && (
            <div className="md:hidden glass px-5 py-4 border-t border-sky-100 flex flex-col gap-3">
              {links.map(s => (
                <a key={s} href={`#${s}`} onClick={() => setOpen(false)}
                  className="font-semibold text-slate-700 hover:text-blue-600 capitalize py-1">{t[s]}</a>
              ))}
              <a href="#/admin" onClick={() => setOpen(false)} className="text-slate-400 text-xs">{t.admin}</a>
            </div>
          )}
        </nav>
      );
    }

    // ================================================================
    //  COURSES
    // ================================================================
    function Courses({ lang }) {
      const t = T[lang].courses;
      return (
        <section id="courses" className="py-24 bg-white">
          <div className="max-w-6xl mx-auto px-5">
            <div className="text-center mb-16">
              <h2 className="font-display text-4xl text-slate-800 mb-3">{t.heading}</h2>
              <p className="text-slate-500 text-lg">{t.sub}</p>
            </div>
            <div className="grid md:grid-cols-3 gap-8">
              {t.items.map((c, i) => (
                <div key={i} className={`course-card rounded-3xl p-8 border-2 relative overflow-hidden group cursor-default ${c.featured ? "ring-4 ring-offset-4" : ""}`}
                  style={{background:c.bg, borderColor:c.border, ringColor: c.featured ? c.border : undefined}}>

                  {c.featured && (
                    <div className="absolute top-5 right-5 text-white text-xs font-extrabold px-3.5 py-1.5 rounded-full shadow-md"
                      style={{background:`linear-gradient(135deg,${c.accent},${c.border})`}}>
                      {t.popular}
                    </div>
                  )}

                  {/* Background decoration */}
                  <div className="absolute -bottom-8 -right-8 w-32 h-32 rounded-full opacity-20"
                    style={{background:c.border}} />

                  <div className="text-5xl mb-4 group-hover:scale-110 transition-transform duration-300">{c.emoji}</div>
                  <span className="tag-badge mb-3 inline-block" style={{background:c.border+"50", color:c.accent}}>
                    {c.level}
                  </span>
                  <h3 className="font-display text-2xl text-slate-800 mb-5">{c.name}</h3>

                  <div className="space-y-2.5 mb-6 bg-white/60 rounded-2xl p-4">
                    <div className="flex items-center gap-2 text-sm">
                      <span className="text-slate-400 font-semibold w-24">⏱ {t.lDur}</span>
                      <span className="font-bold text-slate-700">{c.dur}</span>
                    </div>
                    <div className="w-full h-px bg-slate-100" />
                    <div className="flex items-center gap-2 text-sm">
                      <span className="text-slate-400 font-semibold w-24">💰 {t.lTui}</span>
                      <span className="font-bold text-slate-700">{c.tui}</span>
                    </div>
                  </div>

                  <p className="text-xs font-extrabold uppercase tracking-widest text-slate-400 mb-3">📋 {t.lCon}</p>
                  <ul className="space-y-2 mb-7">
                    {c.content.map((item, j) => (
                      <li key={j} className="text-sm text-slate-700 flex items-start gap-2">
                        <span className="mt-0.5 font-bold" style={{color:c.accent}}>✓</span>
                        {item}
                      </li>
                    ))}
                  </ul>

                  <button
                    className="w-full py-3.5 rounded-2xl font-extrabold text-white text-sm transition-all hover:shadow-xl hover:scale-105 active:scale-95"
                    style={{background:`linear-gradient(135deg, ${c.accent}, ${c.border})`}}>
                    {t.enroll}
                  </button>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // ================================================================
    //  ROADMAP
    // ================================================================
    function Roadmap({ lang }) {
      const t = T[lang].roadmap;
      const colors = ["#BAE6FD","#A7F3D0","#FED7AA","#DDD6FE","#FECDD3"];
      const accents = ["#2563EB","#059669","#D97706","#7C3AED","#DB2777"];
      return (
        <section id="roadmap" className="py-24" style={{background:"linear-gradient(160deg,#F0FDF4 0%,#EFF6FF 50%,#FFF7ED 100%)"}}>
          <div className="max-w-3xl mx-auto px-5">
            <div className="text-center mb-16">
              <h2 className="font-display text-4xl text-slate-800 mb-3">{t.heading}</h2>
              <p className="text-slate-500 text-lg">{t.sub}</p>
            </div>
            <div className="relative">

    // ================================================================

    // ================================================================
    function Quiz({ lang }) {
      const t = T[lang].quiz;
      const courses = T[lang].courses.items;
      const [step, setStep] = React.useState(0);
      const [answers, setAnswers] = React.useState([]);
      const [sel, setSel] = React.useState(null);
      const [done, setDone] = React.useState(false);
      const [result, setResult] = React.useState(null);

      function calcResult(ans) {
        const s = [0,0,0];
        ans.forEach((a,i) => {
          if (i===0) { if(a<=1) s[0]+=3; else if(a===2) s[1]+=3; else s[2]+=3; }
          if (i===1) { if(a===0) s[0]+=2; else if(a===1||a===2) s[2]+=2; else s[1]+=1; }
          if (i===2) { s[Math.min(a,2)]++; }
          if (i===3) { if(a===0) s[0]++; else if(a===1||a===3) s[1]++; else s[2]++; }
          if (i===4) { if(a===0||a===2) s[0]++; else s[1]++; }
        });
        return s.indexOf(Math.max(...s));
      }

      function next() {
        if (sel===null) return;
        const newA = [...answers, sel];
        setAnswers(newA);
        setSel(null);
        if (step===t.questions.length-1) { setResult(calcResult(newA)); setDone(true); }
        else setStep(step+1);
      }

      function back() {
        if (step===0) return;
        setStep(s=>s-1);
        setAnswers(a=>a.slice(0,-1));
        setSel(null);
      }

      function restart() {
        setStep(0); setAnswers([]); setSel(null); setDone(false); setResult(null);
      }

      const course = result!==null ? courses[result] : null;

      return (
        <section id="quiz" className="py-24 bg-white">
          <div className="max-w-2xl mx-auto px-5">
            <div className="text-center mb-12">
              <h2 className="font-display text-4xl text-slate-800 mb-3">{t.heading}</h2>
              <p className="text-slate-500 text-lg">{t.sub}</p>
            </div>

            {!done ? (
              <div className="rounded-3xl p-8 shadow-2xl border border-sky-100"
                style={{background:"linear-gradient(145deg,#F0F9FF,#F0FDF4)"}}>
                {/* Progress bar */}
                <div className="mb-8">
                  <div className="flex justify-between text-xs font-bold text-slate-400 mb-2">
                    <span>Question {step+1} / {t.questions.length}</span>
                    <span>{Math.round((step/t.questions.length)*100)}% done</span>
                  </div>
                  <div className="h-2.5 bg-slate-200 rounded-full overflow-hidden">
                    <div className="h-full rounded-full transition-all duration-600"
                      style={{width:`${(step/t.questions.length)*100}%`,
                        background:"linear-gradient(90deg,#3B82F6,#10B981)"}} />
                  </div>
                </div>

                <h3 className="font-display text-xl text-slate-800 mb-7 leading-snug">{t.questions[step].text}</h3>

                <div className="space-y-3 mb-8">
                  {t.questions[step].opts.map((opt, i) => (
                    <button key={i} onClick={() => setSel(i)}
                      className={`quiz-opt w-full text-left p-4 rounded-2xl border-2 font-semibold text-sm transition-all ${
                        sel===i ? "selected" : "border-slate-200 bg-white text-slate-700 hover:border-sky-300 hover:bg-sky-50"
                      }`}>
                      <span className="inline-flex items-center justify-center w-7 h-7 rounded-full text-xs font-extrabold mr-3"
                        style={{background: sel===i ? "#DBEAFE":"#F1F5F9",
                          color: sel===i ? "#2563EB":"#94A3B8"}}>
                        {String.fromCharCode(65+i)}
                      </span>
                      {opt}
                    </button>
                  ))}
                </div>

                <div className="flex justify-between items-center">
                  <button onClick={back} disabled={step===0}
                    className="text-slate-400 hover:text-slate-600 font-bold px-5 py-2 rounded-xl hover:bg-slate-100 transition-all disabled:opacity-30 text-sm">
                    {t.back}
                  </button>
                  <button onClick={next} disabled={sel===null}
                    className="bg-gradient-to-r from-blue-500 to-teal-500 text-white font-extrabold px-9 py-3 rounded-full shadow-md hover:shadow-xl disabled:opacity-40 transition-all hover:-translate-y-0.5 text-sm">
                    {step===t.questions.length-1 ? t.finish : t.next}
                  </button>
                </div>
              </div>
            ) : course && (
              <div className="text-center rounded-3xl p-10 shadow-2xl border-2 animate-fadeInUp"
                style={{background:course.bg, borderColor:course.border}}>
                <div className="text-7xl mb-5 animate-float">{course.emoji}</div>
                <p className="font-bold text-slate-500 mb-2 uppercase text-xs tracking-widest">{t.resultHeading}</p>
                <h3 className="font-display text-4xl text-slate-800 mb-3">{course.name}</h3>
                <span className="tag-badge inline-block mb-6" style={{background:course.border+"60",color:course.accent}}>
                  {course.level}
                </span>
                <p className="text-slate-600 mb-8 font-semibold">⏱ {course.dur} · {course.tui}</p>
                <div className="flex flex-col sm:flex-row gap-4 justify-center">
                  <a href="#courses"
                    className="font-extrabold px-9 py-3.5 rounded-full text-white shadow-lg hover:shadow-xl transition-all hover:-translate-y-1 text-sm"

    function AdminMedia({ lang }) {
      const t = T[lang].admin.media;
      const [imgs, setImgs] = React.useState([]);
      const [vids, setVids] = React.useState([]);
      const [uploading, setUploading] = React.useState(false);
      const [uploadProgress, setUploadProgress] = React.useState({ done: 0, total: 0 });
      const [drag, setDrag] = React.useState(false);
      const [vidUrl, setVidUrl] = React.useState("");
      const [vidTitle, setVidTitle] = React.useState("");
      const [errorMsg, setErrorMsg] = React.useState(null);
      const [successMsg, setSuccessMsg] = React.useState(null);
      const fileRef = React.useRef();

      function showSuccess(msg) {
        setSuccessMsg(msg);
        setTimeout(() => setSuccessMsg(null), 3500);
      }
      function showError(msg) { setErrorMsg(msg); }

      React.useEffect(() => {
        if (!firebaseReady) return;
        const u1 = db.collection("gallery_images").orderBy("createdAt","desc").onSnapshot(s=>setImgs(s.docs.map(d=>({id:d.id,...d.data()}))));
        const u2 = db.collection("gallery_videos").orderBy("createdAt","desc").onSnapshot(s=>setVids(s.docs.map(d=>({id:d.id,...d.data()}))));
        return ()=>{ u1(); u2(); };
      }, []);

      async function handleFiles(files) {
        if (!files||!files.length) return;
        if (!firebaseReady||CLOUDINARY_CLOUD_NAME==="YOUR_CLOUD_NAME") { showError(t.noConfig); return; }
        // Accept common image formats
        const allowed = ["image/png","image/jpeg","image/jpg","image/webp","image/gif","image/heic","image/heif"];
        const validFiles = Array.from(files).filter(f => {
          if (!allowed.includes(f.type) && !f.name.match(/\.(png|jpg|jpeg|webp|gif|heic|heif)$/i)) {
            showError(`❌ File "${f.name}" không được hỗ trợ. Chỉ chấp nhận: PNG, JPG, WEBP, GIF`);
            return false;
          }
          return true;
        });
        if (!validFiles.length) return;
        setUploading(true);
        setUploadProgress({ done: 0, total: validFiles.length });
        let successCount = 0;
        for (const f of validFiles) {
          try {
            const {url,public_id} = await cloudinaryUpload(f);
            await db.collection("gallery_images").add({
              url, public_id,
              caption: f.name.replace(/\.[^.]+$/, ""),
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            successCount++;
            setUploadProgress(p => ({ ...p, done: p.done + 1 }));
          } catch(e) {
            showError(e.message);
            setUploading(false);
            return;
          }
        }
        setUploading(false);
        if (successCount > 0) showSuccess(`✅ Đã tải lên ${successCount} ảnh thành công!`);
      }

      async function addVideo() {
        const id = ytId(vidUrl);
        if (!id) { showError("❌ Link YouTube không hợp lệ. Ví dụ: https://youtu.be/xxxxx"); return; }
        if (!firebaseReady) { showError(t.noConfig); return; }
        await db.collection("gallery_videos").add({youtubeUrl:vidUrl, videoId:id, title:vidTitle||"", createdAt:firebase.firestore.FieldValue.serverTimestamp()});
        setVidUrl(""); setVidTitle("");
        showSuccess("✅ Đã thêm video thành công!");
      }

      async function delImg(id) {
        if (!confirm(t.deleteImg+"?")) return;
        await db.collection("gallery_images").doc(id).delete();
      }

      async function delVid(id) {
        if (!confirm(t.deleteVid+"?")) return;
        await db.collection("gallery_videos").doc(id).delete();
      }

      return (
        <div className="space-y-8">

          {/* Error modal */}
          {errorMsg && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:"rgba(0,0,0,0.4)"}}>
              <div className="bg-white rounded-3xl shadow-2xl p-7 max-w-md w-full border-2 border-red-200">
                <div className="text-4xl mb-3 text-center">⚠️</div>
                <p className="font-extrabold text-red-600 mb-3 text-center text-sm">Lỗi Upload</p>
                <pre className="bg-red-50 text-red-700 text-xs rounded-xl p-4 whitespace-pre-wrap leading-relaxed mb-5 max-h-60 overflow-y-auto">
                  {errorMsg}
                </pre>
                <button onClick={() => setErrorMsg(null)}
                  className="w-full bg-red-500 hover:bg-red-600 text-white font-extrabold py-3 rounded-2xl transition-colors text-sm">
                  Đóng
                </button>
              </div>
            </div>
          )}

          {/* Success toast */}
          {successMsg && (
            <div className="fixed bottom-6 right-6 z-50 bg-green-50 border-2 border-green-200 text-green-700 font-bold text-sm px-6 py-3 rounded-2xl shadow-xl animate-fadeInUp">
              {successMsg}
            </div>
          )}

          {/* Images */}
          <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
            <h3 className="font-display text-xl text-slate-700 mb-1">📸 {t.imgSection}</h3>
            <p className="text-xs text-slate-400 mb-4 font-semibold">Hỗ trợ: PNG · JPG · WEBP · GIF · HEIC</p>
            <div
              className={`drag-zone rounded-2xl p-12 text-center cursor-pointer ${drag?"active":""}`}
              onClick={() => fileRef.current.click()}
              onDragOver={e=>{e.preventDefault();setDrag(true);}}
              onDragLeave={()=>setDrag(false)}
              onDrop={e=>{e.preventDefault();setDrag(false);handleFiles(e.dataTransfer.files);}}>
              <div className="text-5xl mb-3">{uploading?"⏳":"📤"}</div>
              {uploading ? (
                <div>
                  <p className="text-blue-600 font-extrabold text-sm mb-2">{t.uploading}</p>
                  <p className="text-slate-400 text-xs">{uploadProgress.done} / {uploadProgress.total} ảnh</p>
                  <div className="mt-3 h-2 bg-slate-200 rounded-full overflow-hidden w-48 mx-auto">
                    <div className="h-full bg-gradient-to-r from-blue-400 to-teal-400 rounded-full transition-all"
                      style={{width: uploadProgress.total ? `${(uploadProgress.done/uploadProgress.total)*100}%` : "0%"}} />
                  </div>
                </div>
              ) : (
                <p className="text-slate-500 font-semibold text-sm">{t.dragHint}</p>
              )}
              <input ref={fileRef} type="file" multiple accept="image/png,image/jpeg,image/jpg,image/webp,image/gif,image/heic,image/heif,.png,.jpg,.jpeg,.webp,.gif,.heic" className="hidden"
                onChange={e=>handleFiles(e.target.files)} />
            </div>

            {imgs.length > 0 && (
              <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-3 mt-5">
                {imgs.map(img=>(
                  <div key={img.id} className="relative group rounded-xl overflow-hidden shadow-sm aspect-square">
                    <img src={img.url} alt="gallery" className="w-full h-full object-cover"/>
                    <button onClick={()=>delImg(img.id)}
                      className="absolute top-1 right-1 w-6 h-6 bg-red-500 text-white rounded-full text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity shadow-md">
                      ✕
                    </button>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Videos */}
          <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
            <h3 className="font-display text-xl text-slate-700 mb-5">🎬 {t.vidSection}</h3>
            <div className="grid sm:grid-cols-3 gap-3 mb-4">
              <input value={vidTitle} onChange={e=>setVidTitle(e.target.value)} placeholder={t.titlePH}
                className="border-2 border-slate-200 focus:border-blue-400 rounded-xl px-4 py-2.5 text-sm focus:outline-none" />
              <input value={vidUrl} onChange={e=>setVidUrl(e.target.value)} placeholder={t.urlPH}
                className="border-2 border-slate-200 focus:border-blue-400 rounded-xl px-4 py-2.5 text-sm focus:outline-none" />
              <button onClick={addVideo}
                className="bg-blue-500 hover:bg-blue-600 text-white font-extrabold rounded-xl px-5 py-2.5 text-sm transition-colors">
                {t.addBtn}
              </button>
            </div>

            {vids.length > 0 && (
              <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mt-4">
                {vids.map(vid=>(
                  <div key={vid.id} className="relative group rounded-2xl overflow-hidden border border-slate-100 shadow-sm">
                    <img src={`https://img.youtube.com/vi/${vid.videoId}/mqdefault.jpg`}
                      alt={vid.title} className="w-full h-24 object-cover"/>
                    <div className="p-2 flex items-center gap-1">
                      <p className="text-xs text-slate-600 font-semibold truncate flex-1">{vid.title||vid.videoId}</p>
                      <button onClick={()=>delVid(vid.id)} className="text-red-400 hover:text-red-600 text-xs font-bold flex-shrink-0">✕</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ================================================================
    //  ADMIN — FAQ MANAGER
    // ================================================================
    function AdminFAQ({ lang }) {
      const t = T[lang].admin.faq;
      const [items, setItems] = React.useState([]);
      const [showForm, setShowForm] = React.useState(false);
      const [editId, setEditId] = React.useState(null);
      const blank = {question_en:"",question_vi:"",answer_en:"",answer_vi:""};
      const [form, setForm] = React.useState(blank);

      React.useEffect(() => {
        if (!firebaseReady) return;
        const u = db.collection("faqs").orderBy("order","asc")
          .onSnapshot(s=>setItems(s.docs.map(d=>({id:d.id,...d.data()}))), ()=>{});
        return ()=>u();
      }, []);

      async function save() {
        if (!firebaseReady) { alert("Firebase not configured"); return; }
        if (editId) {
          await db.collection("faqs").doc(editId).update(form);
        } else {
          await db.collection("faqs").add({...form, order:items.length});
        }
        setShowForm(false); setEditId(null); setForm(blank);
      }

      function startEdit(item) {
        setEditId(item.id);
        setForm({question_en:item.question_en||"",question_vi:item.question_vi||"",answer_en:item.answer_en||"",answer_vi:item.answer_vi||""});
        setShowForm(true);
      }

      async function del(id) {
        if (!confirm("Delete this FAQ?")) return;
        await db.collection("faqs").doc(id).delete();
      }

      return (
        <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
          <div className="flex items-center justify-between mb-6">
            <h3 className="font-display text-xl text-slate-700">❓ {t.title}</h3>
            <button onClick={()=>{setShowForm(true);setEditId(null);setForm(blank);}}
              className="bg-blue-500 hover:bg-blue-600 text-white text-sm font-extrabold px-5 py-2.5 rounded-xl transition-colors">
              {t.addBtn}
            </button>
          </div>

          {showForm && (
            <div className="bg-sky-50 rounded-2xl p-5 mb-6 border-2 border-sky-200 space-y-3">
              <div className="grid md:grid-cols-2 gap-3">
                <div>
                  <label className="text-xs font-bold text-slate-400 mb-1 block">{t.qEn}</label>
                  <textarea value={form.question_en} onChange={e=>setForm({...form,question_en:e.target.value})} rows="2"
                    className="w-full border-2 border-slate-200 focus:border-blue-400 rounded-xl p-3 text-sm focus:outline-none resize-none" />
                </div>
                <div>
                  <label className="text-xs font-bold text-slate-400 mb-1 block">{t.qVi}</label>
                  <textarea value={form.question_vi} onChange={e=>setForm({...form,question_vi:e.target.value})} rows="2"
                    className="w-full border-2 border-slate-200 focus:border-blue-400 rounded-xl p-3 text-sm focus:outline-none resize-none" />
                </div>
                <div>
                  <label className="text-xs font-bold text-slate-400 mb-1 block">{t.aEn}</label>
                  <textarea value={form.answer_en} onChange={e=>setForm({...form,answer_en:e.target.value})} rows="3"
                    className="w-full border-2 border-slate-200 focus:border-blue-400 rounded-xl p-3 text-sm focus:outline-none resize-none" />
                </div>
                <div>
                  <label className="text-xs font-bold text-slate-400 mb-1 block">{t.aVi}</label>
                  <textarea value={form.answer_vi} onChange={e=>setForm({...form,answer_vi:e.target.value})} rows="3"
                    className="w-full border-2 border-slate-200 focus:border-blue-400 rounded-xl p-3 text-sm focus:outline-none resize-none" />
                </div>
              </div>
              <div className="flex gap-3">
                <button onClick={save}
                  className="bg-green-500 hover:bg-green-600 text-white font-extrabold px-6 py-2 rounded-xl text-sm transition-colors">
                  {t.save}
                </button>
                <button onClick={()=>setShowForm(false)}
                  className="border-2 border-slate-200 text-slate-600 font-extrabold px-6 py-2 rounded-xl text-sm hover:bg-slate-50 transition-colors">
                  {t.cancel}
                </button>
              </div>
            </div>
          )}

          {items.length === 0 ? (
            <div className="text-center py-10 text-slate-400">
              <div className="text-4xl mb-3">❓</div>
              <p className="text-sm">{t.noItems}</p>
            </div>
          ) : (
            <div className="space-y-3">
              {items.map(item=>(
                <div key={item.id}
                  className="flex items-start gap-3 p-4 border border-slate-100 rounded-2xl hover:bg-slate-50 transition-colors">
                  <div className="flex-1 min-w-0">
                    <p className="font-bold text-sm text-slate-800 truncate">{item.question_en}</p>
                    <p className="text-xs text-slate-400 truncate mt-0.5">{item.question_vi}</p>
                  </div>
                  <div className="flex gap-2 flex-shrink-0">
                    <button onClick={()=>startEdit(item)}
                      className="text-xs font-extrabold text-blue-500 hover:text-blue-700 px-3 py-1.5 rounded-lg hover:bg-blue-50 transition-colors">
                      {t.edit}
                    </button>
                    <button onClick={()=>del(item.id)}
                      className="text-xs font-extrabold text-red-500 hover:text-red-700 px-3 py-1.5 rounded-lg hover:bg-red-50 transition-colors">
                      {t.del}
                    </button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ================================================================
    //  ADMIN — COURSES (Read-only overview for now)
    // ================================================================
    function AdminCourses({ lang }) {
      const t = T[lang].courses;
      return (
        <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
          <h3 className="font-display text-xl text-slate-700 mb-2">📚 {T[lang].admin.tabs.courses}</h3>
          <p className="text-sm text-slate-400 mb-6 bg-amber-50 border border-amber-200 rounded-xl px-4 py-3">
            💡 Course content is defined in the app's translation config. To customize, edit the <code className="bg-slate-100 px-1.5 py-0.5 rounded text-xs">T</code> object in the source code and re-deploy.
          </p>
          <div className="grid md:grid-cols-3 gap-5">
            {t.items.map((c,i)=>(
              <div key={i} className="rounded-2xl p-5 border-2"
                style={{background:c.bg, borderColor:c.border}}>
                <div className="text-4xl mb-3">{c.emoji}</div>
                <span className="tag-badge mb-2 inline-block" style={{background:c.border+"50",color:c.accent}}>{c.level}</span>
                <h4 className="font-display text-lg text-slate-800 mb-2">{c.name}</h4>
                <p className="text-sm text-slate-500">⏱ {c.dur}</p>
                <p className="text-sm text-slate-500">💰 {c.tui}</p>
                <ul className="mt-3 space-y-1">
                  {c.content.map((item,j)=>(
                    <li key={j} className="text-xs text-slate-600 flex gap-1.5 items-start">
                      <span style={{color:c.accent}}>✓</span>{item}
                    </li>
                  ))}
                </ul>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ================================================================
    //  ADMIN — DASHBOARD
    // ================================================================
    function AdminDashboard({ lang, setLang, onLogout }) {
      const t = T[lang].admin;
      const [tab, setTab] = React.useState("media");

      return (
        <div className="min-h-screen bg-slate-50">
          <header className="bg-white shadow-sm border-b border-slate-100 px-6 py-4 flex items-center justify-between sticky top-0 z-40">
            <div className="flex items-center gap-3">
              <span className="font-display text-xl text-blue-600">🔊 Be Heard</span>
              <span className="tag-badge bg-blue-100 text-blue-700">Admin</span>
            </div>
            <div className="flex items-center gap-4">
              <button onClick={()=>setLang(lang==="en"?"vi":"en")}
                className="text-xs border-2 border-sky-200 text-blue-600 font-bold px-3 py-1.5 rounded-full hover:bg-sky-50 transition-colors">
                {lang==="en"?"🇻🇳 VI":"🇺🇸 EN"}
              </button>
              <a href="#" className="text-sm text-slate-500 hover:text-blue-600 font-semibold transition-colors">{t.backToSite}</a>
              <button onClick={onLogout}
                className="text-sm text-red-500 hover:text-red-700 font-extrabold transition-colors">{t.logout}</button>
            </div>
          </header>

          <div className="max-w-5xl mx-auto px-5 py-8">
            <div className="flex gap-3 mb-8 overflow-x-auto pb-1">
              {Object.entries(t.tabs).map(([key,label])=>(
                <button key={key} onClick={()=>setTab(key)}
                  className={`px-6 py-3 rounded-2xl font-extrabold text-sm whitespace-nowrap transition-all ${
                    tab===key
                      ? "bg-gradient-to-r from-blue-500 to-teal-500 text-white shadow-md"
                      : "bg-white text-slate-600 hover:bg-sky-50 border border-slate-200"
                  }`}>
                  {label}
                </button>
              ))}
            </div>

            {tab==="media" && <AdminMedia lang={lang} />}
            {tab==="faq" && <AdminFAQ lang={lang} />}
            {tab==="courses" && <AdminCourses lang={lang} />}
          </div>
        </div>
      );
    }

    // ================================================================
    //  ADMIN SECTION (auth gate)
    // ================================================================
    function AdminSection({ lang, setLang }) {
      const [auth, setAuth] = React.useState(()=>sessionStorage.getItem("bh_adm")==="1");
      const login = () => { sessionStorage.setItem("bh_adm","1"); setAuth(true); };
      const logout = () => { sessionStorage.removeItem("bh_adm"); setAuth(false); };
      if (!auth) return <AdminLogin onLogin={login} lang={lang} />;
      return <AdminDashboard lang={lang} setLang={setLang} onLogout={logout} />;
    }

    // ================================================================
    //  ROOT APP
    // ================================================================
    // Firebase status banner
    function FirebaseBanner() {
      const [visible, setVisible] = React.useState(true);
      if (!visible) return null;
      if (firebaseReady) {
        // Show briefly then auto-hide
        setTimeout(() => setVisible(false), 3500);
        return (
          <div style={{position:"fixed",bottom:20,right:20,zIndex:9999,
            background:"#ECFDF5",border:"2px solid #6EE7B7",
            borderRadius:16,padding:"12px 18px",boxShadow:"0 8px 30px #0002",
            display:"flex",alignItems:"center",gap:10,fontSize:13,fontWeight:700,color:"#065F46",
            animation:"fadeInUp 0.4s ease-out forwards"}}>
            ✅ Firebase connected!
            <button onClick={()=>setVisible(false)} style={{marginLeft:8,opacity:0.5,cursor:"pointer",fontWeight:900,fontSize:15}}>✕</button>
          </div>
        );
      }
      if (_fbErr) return (
        <div style={{position:"fixed",bottom:20,right:20,zIndex:9999,
          background:"#FFF1F2",border:"2px solid #FECDD3",
          borderRadius:16,padding:"14px 18px",boxShadow:"0 8px 30px #0002",maxWidth:360,fontSize:12,color:"#9F1239"}}>
          <p style={{fontWeight:900,fontSize:14,marginBottom:6}}>❌ Firebase Error</p>
          <p style={{marginBottom:8}}>{_fbErr}</p>
          <p style={{fontWeight:700,color:"#BE185D"}}>→ Check Firestore Rules in Firebase Console</p>
          <button onClick={()=>setVisible(false)} style={{marginTop:6,opacity:0.5,cursor:"pointer",fontWeight:900}}>Dismiss</button>
        </div>
      );
      return null;
    }

    function App() {
      const [hash, setHash] = React.useState(window.location.hash);
      const [lang, setLang] = React.useState("en");

      React.useEffect(()=>{
        const fn = ()=>setHash(window.location.hash);
        window.addEventListener("hashchange",fn);
        return ()=>window.removeEventListener("hashchange",fn);
      },[]);

      if (hash.startsWith("#/admin"))
        return <><FirebaseBanner /><AdminSection lang={lang} setLang={setLang} /></>;

      return <><FirebaseBanner /><PublicSite lang={lang} setLang={setLang} /></>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
